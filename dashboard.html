<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shadow Archive | 인기 사건 대시보드</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Pretendard:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="backdrop"></div>
  <main class="dashboard-shell">
    <section class="dashboard-hero card">
      <div class="dashboard-topbar">
        <div>
          <p class="section-tag">Dashboard</p>
          <h1>인기 사건 Top 10</h1>
          <p class="dashboard-copy">
            게시글 좋아요를 기준으로 지금 가장 주목받는 미스테리 사건을 확인할 수 있습니다.
          </p>
        </div>
        <div class="dashboard-actions">
          <a class="ghost-btn nav-link" href="index.html">게시판으로 돌아가기</a>
        </div>
      </div>

      <div class="hero-stats">
        <div class="stat-box">
          <strong id="dashboardPostCount">0</strong>
          <span>전체 사건</span>
        </div>
        <div class="stat-box">
          <strong id="dashboardLikeCount">0</strong>
          <span>전체 좋아요</span>
        </div>
        <div class="stat-box">
          <strong id="dashboardCommentCount">0</strong>
          <span>전체 토론 수</span>
        </div>
      </div>
    </section>

    <section class="dashboard-grid">
      <section class="card dashboard-list-card">
        <div class="section-head">
          <div>
            <p class="section-tag">Top Ranked</p>
            <h2>인기 게시물 순위</h2>
          </div>
        </div>
        <div id="topPostsList" class="dashboard-list"></div>
      </section>

      <aside class="card dashboard-side-card">
        <div class="section-head">
          <div>
            <p class="section-tag">Highlights</p>
            <h2>요약 지표</h2>
          </div>
        </div>
        <div id="dashboardHighlights" class="dashboard-highlights"></div>
      </aside>
    </section>
  </main>

  <script src="dashboard.js"></script>
  <script>
    window.va = window.va || function () {
      (window.vaq = window.vaq || []).push(arguments);
    };
    window.va('beforeSend', function (event) {
      if (localStorage.getItem('va-disable') === '1') {
        return null;
      }
      return event;
    });
  </script>
  <script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
